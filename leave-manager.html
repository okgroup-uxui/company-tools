*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--border:#e2dfd8;--text:#1e1d1a;--muted:#928f88;--dim:#c4c1b9;
  --blue:#1a56db;--blue-bg:#eef3fd;--blue-border:#b8cef8;
  --green:#1a7a4a;--green-bg:#edf7f2;--green-border:#a7dfc2;
  --amber:#8a5a00;--amber-bg:#fef8ec;--amber-border:#f5d98a;
  --red:#c0321a;--red-bg:#fef0ee;--red-border:#f5bdb5;
}
body{font-family:'Ok',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:19px;font-weight:500}.logo em{font-style:italic;color:var(--muted)}
.header-right{display:flex;align-items:center;gap:14px}
.sync-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--dim)}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}
.year-select{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
.year-select select{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-family:'Ok',sans-serif;font-size:13px;color:var(--text);outline:none;cursor:pointer}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 28px}
.tab{padding:11px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .15s;margin-bottom:-1px}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.page{display:none}.page.active{display:block}

/* members layout */
.members-layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 105px)}
@media(max-width:768px){
  .members-layout{grid-template-columns:1fr}
  .sidebar{border-right:none;border-bottom:1px solid var(--border)}
  .detail-stats{grid-template-columns:repeat(2,1fr)!important}
  .log-head{display:none!important}
  .log-row{grid-template-columns:1fr auto!important;gap:4px}
  .log-row .log-date-days{display:flex;gap:6px;align-items:center}
  .add-log-form{display:none!important}
  .btn-add-log-mobile{display:flex!important}
  header{padding:10px 12px}
  .logo{font-size:16px!important}
  .tabs{padding:0 12px}
  .tab{padding:9px 12px!important;font-size:12px!important}
  #page-calendar{padding:8px!important}
  .cal-wrap{padding:12px 10px!important;border-radius:10px!important}
  .cal-header{margin-bottom:10px!important;gap:6px!important}
  .cal-title{font-size:13px!important;min-width:80px!important}
  .cal-btn{width:24px!important;height:24px!important;font-size:13px!important}
  .cal-legend{gap:6px!important;font-size:10px!important}
  .cal-legend-dot{width:6px!important;height:6px!important}
  .cal-grid{gap:2px!important}
  .cal-day-name{font-size:10px!important;padding:3px 0!important}
  .cal-cell{min-height:48px!important;padding:3px 4px!important;border-radius:5px!important}
  .cal-date{font-size:11px!important}
  .cal-holiday-label{font-size:9px!important}
  .cal-birthday-label{font-size:9px!important}
  .cal-event{font-size:10px!important;padding:1px 3px!important;margin-bottom:1px!important;border-radius:3px!important}
  .cal-more{font-size:9px!important}
  .detail-area{padding:14px 16px}
  .sync-status{display:none}
  .year-select{font-size:12px!important}
  .year-select select{font-size:12px!important;padding:3px 7px!important}
}
/* mobile bottom sheet */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200}
.sheet-overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 36px;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px}
.sheet-title{font-size:16px;font-weight:500;margin-bottom:18px}
.sheet-field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.sheet-field label{font-size:12px;font-weight:500;color:var(--muted)}
.sheet-field input,.sheet-field select{font-size:15px;padding:11px 13px;border-radius:9px}
.sheet-date-row{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center}
.sheet-date-row span{text-align:center;font-size:13px;color:var(--muted)}
@media(max-width:768px){
  .sheet-date-row{display:flex;flex-direction:column;gap:8px;align-items:stretch}
  .sheet-date-row span{display:none}
  .sheet-date-row input{width:100%;box-sizing:border-box}
}
.btn-sheet-submit{width:100%;background:var(--text);color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Ok',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px}
.btn-sheet-submit:hover{opacity:.88}
.btn-add-log-mobile{display:none;position:fixed;bottom:24px;right:20px;background:var(--text);color:#fff;border:none;border-radius:99px;padding:13px 20px;font-family:'Ok',sans-serif;font-size:14px;font-weight:500;cursor:pointer;z-index:100;align-items:center;gap:6px;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:14px}
.detail-area{padding:20px 24px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.sec-title{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.stat-card{background:var(--bg);border-radius:9px;padding:10px 12px}
.stat-val{font-size:24px;letter-spacing:-.02em;line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px}
.stat-card.highlight{background:var(--blue-bg);border:1px solid var(--blue-border)}
.stat-card.highlight .stat-val{color:var(--blue)}
.add-form{display:flex;flex-direction:column;gap:7px}
.form-row{display:flex;flex-direction:column;gap:3px}
.form-row label{font-size:11px;font-weight:500;color:var(--muted)}
input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:'Ok',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--text)}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn-add{width:100%;background:var(--text);color:#fff;border:none;border-radius:7px;padding:8px;font-family:'Ok',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-add:hover{opacity:.85}.btn-add:disabled{opacity:.45;cursor:not-allowed}
.member-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto}
.member-item{background:var(--bg);border-radius:8px;padding:9px 11px;cursor:pointer;border:1.5px solid transparent;transition:background .15s}
.member-item:hover{background:#f0ede6}
.member-item.active{background:var(--surface);border-color:var(--text)}
.member-top{display:flex;align-items:center;justify-content:space-between}
.member-name{font-weight:500;font-size:13px}
.member-team{font-size:11px;color:var(--muted);margin-top:1px}
.leave-bar-wrap{margin-top:6px;background:var(--border);border-radius:99px;height:3px;overflow:hidden}
.leave-bar{height:100%;border-radius:99px;background:var(--blue);transition:width .3s}
.leave-bar.warn{background:var(--amber)}.leave-bar.over{background:var(--red)}
.mini-stat{font-size:11px;color:var(--muted);margin-top:3px}
.member-actions{display:flex;gap:4px}
.btn-icon{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:2px 3px;border-radius:4px;transition:all .15s;opacity:0}
.member-item:hover .btn-icon{opacity:1}
.btn-icon:hover{background:var(--bg);color:var(--text)}
.btn-icon.del:hover{color:var(--red)}

/* detail */
.detail-name{font-size:22px;letter-spacing:-.01em;font-weight:500}
.detail-team{font-size:13px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:8px}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ds-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.ds-val{font-size:22px;letter-spacing:-.02em}
.ds-label{font-size:11px;color:var(--muted);margin-top:2px}
.ds-card.green .ds-val{color:var(--green)}.ds-card.amber .ds-val{color:var(--amber)}.ds-card.red .ds-val{color:var(--red)}

/* recommend */
.recommend-section{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 16px}
.recommend-title{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.recommend-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:4px 11px;font-size:12px;cursor:pointer;transition:all .15s;color:var(--text)}
.chip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.chip .chip-sub{color:var(--muted);font-size:11px;margin-left:4px}

/* log */
.log-section{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.log-head{display:grid;grid-template-columns:1.4fr 1fr 0.7fr 1.2fr 52px;background:var(--bg);border-bottom:1px solid var(--border);padding:8px 14px;font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.log-row{display:grid;grid-template-columns:1.4fr 1fr 0.7fr 1.2fr 52px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.log-row:last-child{border-bottom:none}
.log-row:hover{background:var(--bg)}
.log-row.editing{background:var(--blue-bg)}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500}
.tag.annual{background:var(--blue-bg);color:var(--blue)}
.tag.half{background:var(--green-bg);color:var(--green)}
.tag.sick{background:var(--amber-bg);color:var(--amber)}
.tag.special{background:#f3eef8;color:#7c3aed}
.tag.halfhalf{background:#f0fdf4;color:#15803d}
.row-actions{display:flex;gap:3px;align-items:center}
.btn-row-act{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;transition:all .15s}
.btn-row-act:hover.edit{color:var(--blue)}
.btn-row-act:hover.del{color:var(--red)}
.log-empty{text-align:center;padding:28px;color:var(--muted);font-size:13px}
.add-log-form{display:grid;grid-template-columns:1.4fr 1fr 0.7fr 1.2fr 52px;gap:6px;padding:10px 14px;border-top:1px solid var(--border);background:var(--bg);align-items:end}
.add-log-form input,.add-log-form select{padding:6px 8px;font-size:12px}
.add-log-form .btn-group{display:flex;gap:4px}
.btn-log-add{background:var(--text);color:#fff;border:none;border-radius:6px;padding:7px 0;font-family:'Ok',sans-serif;font-size:12px;cursor:pointer;flex:1;transition:opacity .15s}
.btn-log-add:hover{opacity:.8}
.btn-log-cancel{background:none;border:1px solid var(--border);border-radius:6px;padding:7px 0;font-family:'Ok',sans-serif;font-size:12px;cursor:pointer;flex:1;color:var(--muted);display:none}
.btn-log-cancel:hover{border-color:var(--text);color:var(--text)}
.no-member{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:13px;font-style:italic}
@media(max-width:768px){.hide-mobile{display:none!important}.mobile-sub{display:block!important}.log-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}}

/* edit modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:360px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-title{font-size:15px;font-weight:500}
.modal-row{display:flex;flex-direction:column;gap:4px}
.modal-row label{font-size:11px;font-weight:500;color:var(--muted)}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.btn-modal-save{flex:1;background:var(--text);color:#fff;border:none;border-radius:8px;padding:10px;font-family:'Ok',sans-serif;font-size:13px;cursor:pointer;transition:opacity .15s}
.btn-modal-save:hover{opacity:.85}
.btn-modal-cancel{flex:1;background:none;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'Ok',sans-serif;font-size:13px;cursor:pointer;color:var(--muted)}
.btn-modal-cancel:hover{border-color:var(--text);color:var(--text)}

/* calendar */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-title{font-size:16px;font-weight:500;min-width:110px;text-align:center}
.cal-btn{background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-btn:hover{border-color:var(--text);color:var(--text)}
.cal-legend{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:4px}
.cal-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;font-weight:500}
.cal-day-name:first-child{color:var(--red)}.cal-day-name:last-child{color:var(--blue)}
.cal-cell{min-height:80px;border:0.5px solid var(--border);border-radius:7px;padding:5px 6px;background:var(--surface);position:relative}
.cal-cell.other-month{background:var(--bg);opacity:.5}
.cal-cell.past{opacity:.45;pointer-events:none}
.cal-cell.today{border-color:var(--text);border-width:1.5px}
.cal-cell.holiday{background:#fff8f8}
.cal-cell.sunday .cal-date{color:var(--red)}.cal-cell.saturday .cal-date{color:var(--blue)}
.cal-date{font-size:12px;font-weight:500;margin-bottom:3px;line-height:1}
.cal-holiday-label{font-size:10px;color:var(--red);margin-bottom:2px}
.cal-birthday-label{font-size:10px;color:#d97706;margin-bottom:2px}
.cal-event{font-size:11px;border-radius:4px;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.cal-event.annual{background:var(--blue-bg);color:var(--blue)}
.cal-event.half{background:var(--green-bg);color:var(--green)}
.cal-event.halfhalf{background:#f0fdf4;color:#15803d}
.cal-event.sick{background:var(--amber-bg);color:var(--amber)}
.cal-event.special{background:#f3eef8;color:#7c3aed}
.cal-more{font-size:10px;color:var(--muted);padding:1px 4px}
.cal-cell[onclick]:hover{background:var(--blue-bg)!important;transition:background .15s}
</style>
</head>
<body>

<!-- 팀원 수정 모달 -->

<header>
  <div class="logo">Leave<em>Tracker</em></div>
  <div class="header-right">
    <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">연결 중...</span></div>
    <div class="year-select"><span>연도</span>
      <select id="year-sel" onchange="onYearChange()"></select>
    </div>
  </div>
</header>

<div class="tabs">

<div class="page active" id="page-calendar" style="padding:24px 28px">

    <div class="cal-header">
      <div class="cal-nav">
        <button class="cal-btn" onclick="changeMonth(-1)">&#8249;</button>
        <div class="cal-title" id="cal-title"></div>
        <button class="cal-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--blue-bg);border:1px solid var(--blue-border)"></div>연차</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green-bg);border:1px solid var(--green-border)"></div>반차</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f0fdf4;border:1px solid #bbf7d0"></div>반반차</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--amber-bg);border:1px solid var(--amber-border)"></div>병가</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f3eef8;border:1px solid #ddd6fe"></div>특별휴가</div>

    </div>
    <div class="cal-grid" id="cal-grid"></div>

<div class="page" id="page-members">

      <div>
        <div class="sec-title">팀 현황</div>
        <div class="stat-grid">
          <div class="stat-card highlight"><div class="stat-val" id="total-members">0</div><div class="stat-label">팀원 수</div></div>

</div>

<script>
const SUPA_URL='https://bptveoizcohqhlhgqsba.supabase.co', SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwdHZlb2l6Y29ocWhsaGdxc2JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjgwOTEsImV4cCI6MjA5NTYwNDA5MX0.TcUjDVOdR8RvTDchshzZ75olLUmpLZbpZofw2mbsth8';
let members=[], logs={}, grants=[], selectedId=null;
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
let editingMemberId=null, editingLogId=null;

const KR_HOLIDAYS={};

// 매년 반복되는 생일 (MM-DD 형식)
const BIRTHDAYS={
  '02-13':'🎂 이진명',
  '03-19':'🎂 공주원',
  '06-22':'🎂 한지희',
  '08-29':'🎂 박상준',
  '12-18':'🎂 조연주',
  '12-25':'🎂 신수림',
};
function setHolidays(y){
  KR_HOLIDAYS[y]={
    [`${y}-01-01`]:'신정',[`${y}-03-01`]:'삼일절',[`${y}-05-05`]:'어린이날',
    [`${y}-06-03`]:'지방선거',[`${y}-06-06`]:'현충일',[`${y}-08-15`]:'광복절',
    [`${y}-10-03`]:'개천절',[`${y}-10-09`]:'한글날',[`${y}-12-25`]:'크리스마스'
  };
}
const curYear=new Date().getFullYear();
const yearSel=document.getElementById('year-sel');
for(let y=curYear-1;y<=curYear+1;y++){
  const o=document.createElement('option'); o.value=y; o.textContent=y+'년';
  if(y===curYear) o.selected=true;
  yearSel.appendChild(o); setHolidays(y);
}
function getYear(){ return parseInt(yearSel.value); }
function onYearChange(){ renderMemberList(); renderTeamCalendar(); if(selectedId) renderDetail(); }

function setSync(state){
  const dot=document.getElementById('sync-dot'),label=document.getElementById('sync-label');
  if(state==='ok'){dot.className='sync-dot ok';label.textContent='실시간 연동';}
  else if(state==='err'){dot.className='sync-dot err';label.textContent='연결 실패';}
  else{dot.className='sync-dot';label.textContent='연결 중...';}
}

async function supa(path,opts={}){
  const headers={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
  if(opts.method==='POST') headers['Prefer']='return=representation';
  if(opts.method==='PATCH') headers['Prefer']='return=representation';
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{...opts,headers});
  if(!res.ok) throw new Error(await res.text());
  if(res.status===204||res.headers.get('content-length')==='0') return null;
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')?res.json():null;
}

async function loadData(){
  try{
    members=await supa('members?order=created_at.asc')||[];
    const allLogs=await supa('leave_logs?order=start_date.desc')||[];
    logs={};
    allLogs.forEach(l=>{ if(!logs[l.member_id]) logs[l.member_id]=[]; logs[l.member_id].push(l); });
    grants=await supa('leave_grants?order=created_at.asc')||[];
    setSync('ok');
    await checkAndApplyGrants();
    renderAll();
  }catch(e){ setSync('err'); }
}

function getLogs(mid){ return (logs[mid]||[]).filter(l=>new Date(l.start_date).getFullYear()===getYear()); }
function usedDays(mid){ return parseFloat(getLogs(mid).reduce((s,l)=>s+parseFloat(l.days),0).toFixed(2)); }

function getMemberTotal(mid){
  const m=members.find(x=>x.id===mid); if(!m) return 0;
  const year=getYear();
  const memberGrants=grants.filter(g=>g.member_id===mid && g.year===year);
  const grantTotal=memberGrants.reduce((s,g)=>s+parseFloat(g.amount),0);
  return parseFloat((m.total + grantTotal).toFixed(2));
}

async function checkAndApplyGrants(){
  const now=new Date();
  const currentYear=now.getFullYear();
  const currentMonth=now.getMonth()+1;
  const currentDay=now.getDate();
  // 6월 2일 이후부터 지급
  if(currentMonth < 6 || (currentMonth===6 && currentDay < 2)) return;

  // 6월 지급 체크 - 아직 지급 안 된 팀원에게만
  for(const m of members){
    const already=grants.find(g=>g.member_id===m.id && g.year===currentYear && g.month===6);
    if(!already){
      try{
        const id='G'+Date.now()+Math.random().toString(36).slice(2,6);
        const res=await supa('leave_grants',{method:'POST',body:JSON.stringify({
          id, member_id:m.id, year:currentYear, month:6, amount:1, reason:'반기 연차 지급'
        })});
        const grant=res?res[0]:{id,member_id:m.id,year:currentYear,month:6,amount:1,reason:'반기 연차 지급'};
        grants.push(grant);
        console.log(`${m.name} 반기 연차 +1일 지급 완료`);
      }catch(e){ console.error('연차 지급 실패:', e); }
    }
  }
}

/* ── multi-day log ── */
function getWorkdaysBetween(start, end){
  const days=[]; let cur=new Date(start);
  const endD=new Date(end);
  while(cur<=endD){
    const dow=cur.getDay();
    const ds=cur.toISOString().slice(0,10);
    const y=cur.getFullYear(); setHolidays(y);
    if(dow!==0&&dow!==6&&!(KR_HOLIDAYS[y]||{})[ds]) days.push(ds);
    cur.setDate(cur.getDate()+1);
  }
  return days;
}

async function addLog(){
  if(!selectedId) return;
  const reason=document.getElementById('log-reason').value.trim();
  const startDate=document.getElementById('log-start').value;
  const endDate=document.getElementById('log-end').value||startDate;
  const days=parseFloat(document.getElementById('log-days').value);
  const type=document.getElementById('log-type').value;
  if(!reason||!startDate||!days){alert('모든 항목을 입력해주세요.');return;}

  // 과거 날짜 차단
  const todayStr=new Date().toISOString().slice(0,10);
  if(startDate < todayStr){alert('과거 날짜에는 휴가를 등록할 수 없어요.');return;}

  // 연차 초과 경고 (병가·특별휴가는 제외)
  if(type!=='sick'&&type!=='special'){
    const isMulti=endDate&&endDate!==startDate&&type==='annual';
    const addDays=isMulti?getWorkdaysBetween(startDate,endDate).length:days;
    const remain=getMemberTotal(selectedId)-usedDays(selectedId);
    if(addDays>remain){
      if(!confirm(`잔여 연차(${remain}일)보다 많은 ${addDays}일을 등록하려 해요.\n초과 등록할까요?`)) return;
    }
  }

  const btn=document.querySelector('.btn-log-add'); btn.disabled=true;
  try{
    // 연차(1일)이고 종료일이 있을 경우 날짜별 개별 등록
    const isMulti = endDate && endDate!==startDate && type==='annual';
    if(isMulti){
      const workdays=getWorkdaysBetween(startDate, endDate);
      for(const wd of workdays){
        const id='L'+Date.now()+Math.random();
        const res=await supa('leave_logs',{method:'POST',body:JSON.stringify({id,member_id:selectedId,reason,start_date:wd,days:1,type})});
        const log=res?res[0]:{id,member_id:selectedId,reason,start_date:wd,days:1,type};
        if(!logs[selectedId]) logs[selectedId]=[];
        logs[selectedId].unshift(log);
      }
    } else {
      const id='L'+Date.now();
      const res=await supa('leave_logs',{method:'POST',body:JSON.stringify({id,member_id:selectedId,reason,start_date:startDate,days,type})});
      const log=res?res[0]:{id,member_id:selectedId,reason,start_date:startDate,days,type};
      if(!logs[selectedId]) logs[selectedId]=[];
      logs[selectedId].unshift(log);
    }
    document.getElementById('log-reason').value='개인사유';
    document.getElementById('log-start').value='';
    document.getElementById('log-end').value='';
    document.getElementById('log-days').value='1';
    renderDetail(); renderMemberList(); renderTeamCalendar();
  }catch(e){alert('저장 실패: '+e.message);}
  btn.disabled=false;
}

/* ── recommend ── */
function getRecommendDates(mid){
  const m=members.find(x=>x.id===mid); if(!m) return [];
  const year=getYear(), remain=getMemberTotal(mid)-usedDays(mid);
  if(remain<=0) return [];
  const holidays=KR_HOLIDAYS[year]||{};
  const usedDates=new Set((logs[mid]||[]).map(l=>l.start_date));
  const recs=[];
  Object.entries(holidays).forEach(([date,name])=>{
    const d=new Date(date),dow=d.getDay();
    const chk=ds=>!usedDates.has(ds)&&new Date(ds)>new Date()?ds:null;
    if(dow===4){const f=new Date(d);f.setDate(d.getDate()+1);const s=f.toISOString().slice(0,10);if(chk(s))recs.push({date:s,label:name+' 연결',effect:'4일 연휴',days:1});}
    if(dow===2){const mn=new Date(d);mn.setDate(d.getDate()-1);const s=mn.toISOString().slice(0,10);if(chk(s))recs.push({date:s,label:name+' 징검다리',effect:'4일 연휴',days:1});}
  });
  if(remain>=5){
    const aug=new Date(year,7,4).toISOString().slice(0,10);
    const dec=new Date(year,11,22).toISOString().slice(0,10);
    if(new Date(aug)>new Date()) recs.push({date:aug,label:'여름 황금연휴',effect:'9일 연휴',days:5});
    if(new Date(dec)>new Date()) recs.push({date:dec,label:'연말 황금연휴',effect:'크리스마스 연결',days:5});
  }
  return recs.slice(0,5);
}

/* ── team calendar ── */
function renderTeamCalendar(){
  const holidays=KR_HOLIDAYS[calYear]||{};
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames=['일','월','화','수','목','금','토'];
  const typeClass={annual:'annual',half_am:'half',half_pm:'half',halfhalf_am:'halfhalf',halfhalf_pm:'halfhalf',sick:'sick',special:'special'};
  const typeLabel={annual:'연차',half_am:'오전반차',half_pm:'오후반차',halfhalf_am:'오전반반차',halfhalf_pm:'오후반반차',sick:'병가',special:'특별휴가'};
  document.getElementById('cal-title').textContent=`${calYear}년 ${monthNames[calMonth]}`;

  const dateMap={};
  members.forEach(m=>{
    (logs[m.id]||[]).forEach(l=>{
      const d=new Date(l.start_date);
      if(d.getFullYear()===calYear&&d.getMonth()===calMonth){
        if(!dateMap[l.start_date]) dateMap[l.start_date]=[];
        dateMap[l.start_date].push({name:m.name,type:l.type,reason:l.reason,days:l.days});
      }
    });
  });

  let html='';
  dayNames.forEach(d=>html+=`<div class="cal-day-name">${d}</div>`);
  for(let i=firstDay-1;i>=0;i--) html+=`<div class="cal-cell other-month"><div class="cal-date">${prevDays-i}</div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const mm=String(calMonth+1).padStart(2,'0'),dd=String(d).padStart(2,'0');
    const dateStr=`${calYear}-${mm}-${dd}`;
    const dow=new Date(calYear,calMonth,d).getDay();
    const holiday=holidays[dateStr];
    const birthday=BIRTHDAYS[`${mm}-${dd}`];
    const events=dateMap[dateStr]||[];
    let cls='cal-cell';
    if(dateStr===todayStr) cls+=' today';
    else if(dateStr<todayStr) cls+=' past';
    if(holiday) cls+=' holiday';
    if(dow===0) cls+=' sunday'; if(dow===6) cls+=' saturday';
    let inner=`<div class="cal-date">${d}</div>`;
    if(holiday) inner+=`<div class="cal-holiday-label">${holiday}</div>`;
    if(birthday) inner+=`<div class="cal-birthday-label">${birthday}</div>`;
    events.slice(0,3).forEach(ev=>{
      inner+=`<div class="cal-event ${typeClass[ev.type]||'annual'}" title="${ev.name} — ${typeLabel[ev.type]||'연차'} (${ev.days}일)">${ev.name}</div>`;
    });
    if(events.length>3) inner+=`<div class="cal-more">+${events.length-3}명 더</div>`;
    const clickable = !holiday && dow!==0 && dow!==6 && dateStr>=todayStr;
    const clickAttr = clickable ? `onclick="openSheetWithDate('${dateStr}')" style="cursor:pointer"` : '';
    html+=`<div class="${cls}" ${clickAttr}>${inner}</div>`;
  }
  const total=firstDay+daysInMonth, rem=total%7===0?0:7-(total%7);
  for(let i=1;i<=rem;i++) html+=`<div class="cal-cell other-month"><div class="cal-date">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=html;
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;setHolidays(calYear);}
  if(calMonth<0){calMonth=11;calYear--;setHolidays(calYear);}
  renderTeamCalendar();
}

setInterval(loadData,30000);


function populateSheetMemberSelect(preselectedId){
  const sel=document.getElementById('sheet-member');
  if(!sel) return;
  sel.innerHTML='<option value="">팀원 선택</option>';
  members.forEach(m=>{
    const opt=document.createElement('option');
    opt.value=m.id; opt.textContent=m.name;
    if(m.id===preselectedId) opt.selected=true;
    sel.appendChild(opt);
  });
}
function openSheetWithDate(dateStr){
  populateSheetMemberSelect(selectedId||'');
  document.getElementById('sheet-start').value=dateStr;
  document.getElementById('sheet-end').value=dateStr;
  document.getElementById('sheet-reason').value='개인사유';
  document.getElementById('sheet-days').value='1';
  document.getElementById('sheet-type').value='annual';
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet-panel').classList.add('open');
  document.querySelector('.sheet-title').textContent=`휴가 등록 — ${dateStr}`;
}
function openSheet(){
  populateSheetMemberSelect(selectedId||'');
  document.querySelector('.sheet-title').textContent='휴가 등록';
  document.getElementById('sheet-start').value='';
  document.getElementById('sheet-end').value='';
  document.getElementById('sheet-reason').value='개인사유';
  document.getElementById('sheet-days').value='1';
  document.getElementById('sheet-type').value='annual';
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet-panel').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet-panel').classList.remove('open');
}
function applySheetTypeDays(type){
  const el=document.getElementById('sheet-days'); if(!el) return;
  if(type==='half_am'||type==='half_pm') el.value='0.5';
  else if(type==='halfhalf_am'||type==='halfhalf_pm') el.value='0.25';
  else if(type==='annual') el.value='1';
}
async function addLogFromSheet(){
  const memberId=document.getElementById('sheet-member').value;
  if(!memberId){alert('팀원을 선택해주세요.');return;}
  const reason=document.getElementById('sheet-reason').value.trim();
  const startDate=document.getElementById('sheet-start').value;
  const endDate=document.getElementById('sheet-end').value||startDate;
  const days=parseFloat(document.getElementById('sheet-days').value);
  const type=document.getElementById('sheet-type').value;
  if(!reason||!startDate||!days){alert('모든 항목을 입력해주세요.');return;}

  // 과거 날짜 차단
  const todayStr=new Date().toISOString().slice(0,10);
  if(startDate < todayStr){alert('과거 날짜에는 휴가를 등록할 수 없어요.');return;}

  // 연차 초과 경고 (병가·특별휴가는 제외)
  if(type!=='sick'&&type!=='special'){
    const isMulti=endDate&&endDate!==startDate&&type==='annual';
    const addDays=isMulti?getWorkdaysBetween(startDate,endDate).length:days;
    const remain=getMemberTotal(memberId)-usedDays(memberId);
    if(addDays>remain){
      if(!confirm(`잔여 연차(${remain}일)보다 많은 ${addDays}일을 등록하려 해요.\n초과 등록할까요?`)) return;
    }
  }

  const btn=document.querySelector('.btn-sheet-submit'); btn.disabled=true;
  try{
    const isMulti=endDate&&endDate!==startDate&&type==='annual';
    if(isMulti){
      const workdays=getWorkdaysBetween(startDate,endDate);
      for(const wd of workdays){
        const id='L'+Date.now()+Math.random();
        const res=await supa('leave_logs',{method:'POST',body:JSON.stringify({id,member_id:memberId,reason,start_date:wd,days:1,type})});
        const log=res?res[0]:{id,member_id:memberId,reason,start_date:wd,days:1,type};
        if(!logs[memberId]) logs[memberId]=[];
        logs[memberId].unshift(log);
      }
    } else {
      const id='L'+Date.now();
      const res=await supa('leave_logs',{method:'POST',body:JSON.stringify({id,member_id:memberId,reason,start_date:startDate,days,type})});
      const log=res?res[0]:{id,member_id:memberId,reason,start_date:startDate,days,type};
      if(!logs[memberId]) logs[memberId]=[];
      logs[memberId].unshift(log);
    }
    document.getElementById('sheet-reason').value='개인사유';
    document.getElementById('sheet-start').value='';
    document.getElementById('sheet-end').value='';
    document.getElementById('sheet-days').value='1';
    closeSheet();
    renderDetail(); renderMemberList(); renderTeamCalendar();
  }catch(e){alert('저장 실패: '+e.message);}
  btn.disabled=false;
}
</script>

<!-- mobile FAB -->
<button class="btn-add-log-mobile" id="fab-add-log" onclick="openSheet()">+ 휴가 등록</button>

<!-- bottom sheet overlay -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet-panel">
  <div class="sheet-handle"></div>
  <div class="sheet-title">휴가 등록</div>
  <div class="sheet-field">
    <label>팀원</label>
    <select id="sheet-member"><option value="">팀원 선택</option></select>
  </div>
  <div class="sheet-field">
    <label>사유</label>
    <input id="sheet-reason" type="text" value="개인사유" placeholder="사유 입력">
  </div>
  <div class="sheet-field">
    <label>시작일</label>
    <div class="sheet-date-row">
      <input id="sheet-start" type="date" onchange="checkDateValid(this); const e=document.getElementById('sheet-end'); if(!e.value||e.value<this.value) e.value=this.value;">
      <span>~</span>
      <input id="sheet-end" type="date" onchange="checkDateValid(this)">
    </div>
    <div class="sheet-date-end-label" style="font-size:11px;color:var(--muted);margin-top:2px">종료일 (하루면 시작일과 동일하게)</div>
  </div>
  <div class="sheet-field">
    <label>유형</label>
    <select id="sheet-type" onchange="applySheetTypeDays(this.value)">
      <option value="annual">연차 (1일)</option>
      <option value="half_am">오전반차 (0.5일)</option>
      <option value="half_pm">오후반차 (0.5일)</option>
      <option value="halfhalf_am">오전반반차 (0.25일)</option>
      <option value="halfhalf_pm">오후반반차 (0.25일)</option>
      <option value="sick">병가</option>
      <option value="special">특별휴가</option>
    </select>
  </div>
  <div class="sheet-field">
    <label>일수</label>
    <input id="sheet-days" type="number" value="1" min="0.25" max="30" step="0.25">
  </div>
  <button class="btn-sheet-submit" onclick="addLogFromSheet()">등록</button>
</div>
</body>
</html>
